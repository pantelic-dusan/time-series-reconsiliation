data:
  data_path: "data/data.csv"
  target_col: "quantity"
  time_col: "date"
  id_cols:
    - "material"
    - "customer"
    - "location"
  frequency: "MS"  # Month Start

experiment:
  horizon: 6               # Number of periods to forecast
  train_end_date: "2025-06-01"  # Last date included in training set from 2025-07-01 onward is held out for testing
  seed: 42

hpo:
  num_val_periods: 6         # Last N base-frequency periods held out for HPO validation
  n_trials: 10               # Optuna trials per model per level
  objective: "WAPE"          # Metric to minimise (from evaluation/evaluation.py)
  sample_frac: null        # default fraction of ts_ids per level; per-level override below wins
  output_config: "config/config_tuned.yaml"  # Written by tune.py; consumed by train.py

hierarchy:
  # Base level = material_customer_location at monthly — runs first, always.
  # Default behavior: no HPO subsampling. Add `sample_frac: <0..1>` to any
  # entry (or to `base`) to enable sampling for that level only.
  base:
    sample_frac: 0.1

  structural_levels:
    - "customer"     # ~127 series
    - "location"     # ~10 series
    - "CBF"          # ~16 series
    - "PH1"          # ~119 series
    - "PH2"          # ~396 series
    - "PH3"          # ~686 series
    - "total"        # 1 series

  # Temporal aggregation levels — each is cross-joined with base + every structural level.
  # Cross-temporal levels inherit the cross-section's resolved sample_frac.
  temporal_levels:
    - name: "quarter"
      freq: "QS"          # Quarter Start — resample monthly data to quarterly
      horizon: 2          # Number of quarters to forecast
      num_val_periods: 2  # Quarters held out for HPO validation (= 3 months)
      param_overrides:
        arima:
          seasonal_period: 4
        holt_winters:
          seasonal_periods: 4
        random_forest:
          n_lags: 12
        random_forest_direct:
          n_lags: 12
        lightgbm:
          n_lags: 12
        lightgbm_direct:
          n_lags: 12
        deepar:
          context_length: 12
        nhits:
          input_size: 12
        chronos:
          context_length: 32
        timesfm:
          context_length: 64
      # HPO search spaces here are frequency-aware: smaller seasonal periods
      # and lag windows than the monthly defaults so they fit within ~22
      # quarters of training history.
      search_space_overrides:
        arima:
          seasonal_period:
            type: categorical
            choices: [2, 4]
        random_forest:
          n_lags:
            type: categorical
            choices: [4, 8, 12]
        random_forest_direct:
          n_lags:
            type: categorical
            choices: [4, 8, 12]
        lightgbm:
          n_lags:
            type: categorical
            choices: [4, 8, 12]
        lightgbm_direct:
          n_lags:
            type: categorical
            choices: [4, 8, 12]
        deepar:
          context_length:
            type: int
            low: 4
            high: 12
        nhits:
          input_size:
            type: categorical
            choices: [4, 8, 12]

models:
  # --- Statistical ---
  - name: "arima"
    params:
      seasonal_period: 12  # auto_arima selects optimal (p,d,q)(P,D,Q,s) per series
      n_jobs: -1           # parallel fitting: -1 = all CPU cores
    hpo:
      enabled: true
      # auto_arima already does internal order selection; outer HPO only picks
      # the seasonal period m. Tiny grid -> runs as GridSampler (2 trials).
      search_space:
        seasonal_period:
          type: categorical
          choices: [6, 12]

  - name: "holt_winters"
    params:
      seasonal_periods: 12
      trend: "add"
      seasonal: "add"
    hpo:
      enabled: true
      search_space:
        trend:
          type: categorical
          choices: ["add"]
        seasonal:
          type: categorical
          choices: ["add"]

  - name: "prophet"
    params:
      yearly_seasonality: true
      weekly_seasonality: false
      daily_seasonality: false
      n_jobs: -1   # parallel per-series fitting via joblib (consumed by wrapper, not Prophet)
    hpo:
      enabled: true
      search_space:
        changepoint_prior_scale:
          type: float
          low: 0.001
          high: 0.5
          log: true
        seasonality_prior_scale:
          type: float
          low: 0.01
          high: 10.0
          log: true

  # --- Classic ML ---
  # Two entries per tree model. Both variants are tuned independently:
  # the recursive variant tunes on the full horizon; the direct variant tunes
  # only the 1-step-ahead model (`horizon_override: 1`) and reuses those
  # hyperparameters across all per-step models trained by train.py.
  - name: "random_forest"
    type: "random_forest"
    params:
      n_estimators: 100
      max_depth: 10
      n_lags: 24
      strategy: "recursive"
      n_jobs: -1   # parallel tree fitting (forwarded to RandomForestRegressor)
    hpo:
      enabled: true
      search_space:
        n_estimators:
          type: int
          low: 50
          high: 500
        max_depth:
          type: int
          low: 3
          high: 20
        min_samples_split:
          type: int
          low: 2
          high: 20
        min_samples_leaf:
          type: int
          low: 1
          high: 10
        n_lags:
          type: categorical
          choices: [6, 12, 24]

  - name: "random_forest_direct"
    type: "random_forest"
    params:
      n_estimators: 100
      max_depth: 10
      n_lags: 24
      strategy: "direct"
      n_jobs: -1
    hpo:
      enabled: true
      search_space:
        n_estimators:
          type: int
          low: 50
          high: 500
        max_depth:
          type: int
          low: 3
          high: 20
        min_samples_split:
          type: int
          low: 2
          high: 20
        min_samples_leaf:
          type: int
          low: 1
          high: 10
        n_lags:
          type: categorical
          choices: [6, 12, 24]

  - name: "lightgbm"
    type: "lightgbm"
    params:
      n_estimators: 100
      learning_rate: 0.1
      num_leaves: 31
      n_lags: 24
      strategy: "recursive"
    hpo:
      enabled: true
      search_space:
        n_estimators:
          type: int
          low: 50
          high: 500
        learning_rate:
          type: float
          low: 0.005
          high: 0.3
          log: true
        num_leaves:
          type: int
          low: 16
          high: 256
        min_child_samples:
          type: int
          low: 5
          high: 100
        n_lags:
          type: categorical
          choices: [6, 12, 24]

  - name: "lightgbm_direct"
    type: "lightgbm"
    params:
      n_estimators: 100
      learning_rate: 0.1
      num_leaves: 31
      n_lags: 24
      strategy: "direct"
    hpo:
      enabled: true
      search_space:
        n_estimators:
          type: int
          low: 50
          high: 500
        learning_rate:
          type: float
          low: 0.005
          high: 0.3
          log: true
        num_leaves:
          type: int
          low: 16
          high: 256
        min_child_samples:
          type: int
          low: 5
          high: 100
        n_lags:
          type: categorical
          choices: [6, 12, 24]

  # --- Deep Learning ---
  - name: "deepar"
    params:
      max_epochs: 50
      hidden_size: 32
      rnn_layers: 2
      context_length: 24
      batch_size: 32
    hpo:
      enabled: true
      max_epochs_hpo: 10    # trial budget cap; final fit uses params.max_epochs
      search_space:
        hidden_size:
          type: categorical
          choices: [16, 32, 64, 128]
        rnn_layers:
          type: int
          low: 1
          high: 3
        context_length:
          type: int
          low: 6
          high: 24
        batch_size:
          type: categorical
          choices: [16, 32, 64]

  - name: "nhits"
    params:
      max_steps: 1000
      input_size: 24
      n_blocks: [1, 1, 1]
      mlp_units: [[512, 512], [512, 512], [512, 512]]
      batch_size: 32
    hpo:
      enabled: true
      max_steps_hpo: 200    # trial budget cap; final fit uses params.max_steps
      search_space:
        input_size:
          type: categorical
          choices: [12, 24]
        batch_size:
          type: categorical
          choices: [16, 32, 64]

  # --- Foundation (pretrained, zero-shot) ---
  - name: "chronos"
    params:
      model_path: "amazon/chronos-2"  # Chronos-2 (Oct 2025) — newest, uses Chronos2Pipeline
      device: "cpu"
      context_length: 128
    hpo:
      enabled: false  # Zero-shot pretrained; no trainable hyperparameters

  - name: "timesfm"
    params:
      model_path: "google/timesfm-2.0-500m-pytorch"  # TimesFM 2.0 — 500M, 50 layers, 1280 dims
      context_length: 256
    hpo:
      enabled: false  # Zero-shot pretrained; no trainable hyperparameters

storage:
  output_dir: "outputs"
  forecasts_dir: "outputs/forecasts"
  evaluations_dir: "outputs/evaluations"
  checkpoint_dir: "outputs/checkpoints"
  residuals_dir: "outputs/residuals"

reconciliation:
  # Methods applied on top of original per-level forecasts. Each method writes
  # an additional file `<level>/<model>__<method>_forecasts.csv` next to the
  # originals, which `evaluate.py` then scores alongside the unreconciled
  # baseline (reconciliation_method = "none").
  nonnegative: true   # enforce non-negative reconciled forecasts via constrained QP
  enabled_methods:
    - "OLS"          # ordinary least squares (Hyndman 2011)
    - "WLS_struct"   # weighted least squares, structural scaling
    - "WLS_var"      # weighted least squares, variance scaling (uses residuals)
    - "MinT_shrink"  # MinT with Schäfer-Strimmer shrinkage covariance (uses residuals)
    - "MinT_cov"     # MinT with full sample covariance (uses residuals)
    - "EMinT"        # Empirical MinT (uses residuals)
  enabled_modes:
    - "cross_structural_monthly"      # struct + base at monthly frequency
    - "cross_structural_quarterly"    # struct + base at quarterly frequency
    - "cross_temporal"                # monthly <-> quarterly per ts_id (library MinTrace; all 6 methods)
    - "cross_temporal_structural"     # joint (level x frequency) (library MinTrace; all 6 methods)
  # Suffix convention for reconciled forecast files inside each level dir.
  filename_suffix_separator: "__"

